name: CI/CD Docker Hub

on:
  push:
    branches:
      - main # Chạy tự động mỗi khi bạn push code lên nhánh main

jobs:
  deploy-job:
    runs-on: ubuntu-latest

    steps:
      # 1. Sử dụng Action lấy code từ Github (Checkout)
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # 2. Sử dụng Action Đăng nhập Docker Hub (Docker Login)
      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Sử dụng Action Đóng gói & Đẩy Image (Build and push Docker images)
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          # Gắn tags cho image (nhớ thay 'ten-du-an' bằng tên repo Docker của bạn)
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/introduce-myself:latest
            ${{ secrets.DOCKER_USERNAME }}/introduce-myself:${{ github.run_id }}

      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="khoadang113/introduce-myself"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=7&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
      
